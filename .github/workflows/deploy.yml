name : build and deploy AWS ECR the warehouse

on :
  push :
     branches: [main]

jobs:
  build-and-push :  
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses:  actions/checkout@v3
        
      - name: configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
        
      - name: login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        
      - name: build tag and push the image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/myapp:$IMAGE_TAG .
          docker push $ECR_REGISTRY/myapp:$IMAGE_TAG  

      - name: Update Manifest Repo
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          git config --global user.email "meghna.srivastava@globallogic.com"
          git config --global user.name "Meghna-GL"
          
          # We use the token to tell Git how to log in for this specific repo
          git clone https://Meghna-GL:${MY-GITHUB_TOKEN}@github.com/Meghna-GL/myapp-config.git
          
          cd myapp-config
          
          # This command finds the 'image:' line and replaces the whole line
          sed -i "s|image:.*|image: ${{ steps.login-ecr.outputs.registry }}/myapp:${{ github.sha }}|g" deployment.yaml
          
          git add deployment.yaml
          git commit -m "Update image to ${{ github.sha }}"
          git push origin main
