name : build and deploy AWS ECR the warehouse

on :
  push :
     branches: [main]

jobs:
  build-and-push :  
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses:  actions/checkout@v3
        
      - name: configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
        
      - name: login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        
      - name: build tag and push the image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/myapp:$IMAGE_TAG .
          docker push $ECR_REGISTRY/myapp:$IMAGE_TAG  

      - name: Update Manifest Repo
        run: |
          git config --global user.email "meghna.srivastava@globallogic.com"
          git config --global user.name "Meghna-GL"
          # Clone the Config Repo
          git clone https://${{ secrets.MY_GITHUB_TOKEN }}@github.com/Meghna-GL/myapp-config.git
          cd myapp-config
          # Use 'sed' to swap "REPLACE_ME" with the actual ECR image path
          sed -i "s|image: REPLACE_ME|image: ${{ steps.login-ecr.outputs.registry }}/my-cool-app:${{ github.sha }}|g" deployment.yaml
          # Push the changes back to GitHub
          git add deployment.yaml
          git commit -m "Update image to ${{ github.sha }}"
          git push
